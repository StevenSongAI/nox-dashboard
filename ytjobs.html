<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTJobs Talent DB - Nox Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-card: #1a1a2e;
      --border: #252540;
      --accent: #7c3aed;
      --accent-light: #8b5cf6;
    }
    body {
      background: var(--bg-primary);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .badge-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .badge-blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .badge-gold { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .badge-gray { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    .category-video { background: rgba(124, 58, 237, 0.2); color: #a78bfa; }
    .category-thumb { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
    .category-creative { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
    .category-channel { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    .category-script { background: rgba(234, 179, 8, 0.2); color: #facc15; }
    .category-producer { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
    .category-strategist { background: rgba(20, 184, 166, 0.2); color: #2dd4bf; }
    .category-voice { background: rgba(6, 182, 212, 0.2); color: #67e8f9; }
    .category-other { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      transition: width 0.3s;
    }
    .talent-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      transition: all 0.2s;
    }
    .avatar-placeholder {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }
    input, select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: #e2e8f0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: var(--accent-light);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .verified-icon { color: #3b82f6; }
    .hire-me-badge { background: rgba(34, 197, 94, 0.2); color: #4ade80; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen">
  <header class="border-b p-4" style="border-color: var(--border); background: var(--bg-card);">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">⚡</span>
        <h1 class="text-xl font-bold">Nox Dashboard</h1>
        <span class="text-sm opacity-60">YTJobs Talent DB</span>
      </div>
      <a href="index.html" class="text-sm opacity-60 hover:opacity-100">← Back to Dashboard</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4">
    <!-- Stats Header -->
    <div class="card p-6 mb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h2 class="text-2xl font-bold mb-2">YouTube Talent Database</h2>
          <p class="text-sm opacity-60" id="last-updated">Loading...</p>
        </div>
        <div class="text-right">
          <div class="text-3xl font-bold" id="total-count">0</div>
          <div class="text-sm opacity-60">talents discovered</div>
        </div>
      </div>
      
      <div class="mt-4">
        <div class="flex justify-between text-sm mb-2">
          <span>Scraping Progress</span>
          <span id="progress-text">0 / 7668 pages</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 mt-4" id="category-stats">
        <!-- Category pills injected here -->
      </div>
    </div>

    <!-- Filters -->
    <div class="card p-4 mb-6">
      <div class="flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-[200px]">
          <label class="text-xs opacity-60 block mb-1">Search Name</label>
          <input type="text" id="search-input" placeholder="Search talents..." class="w-full">
        </div>
        <div>
          <label class="text-xs opacity-60 block mb-1">Category</label>
          <select id="category-filter">
            <option value="">All Categories</option>
          </select>
        </div>
        <div>
          <label class="text-xs opacity-60 block mb-1">Badge</label>
          <select id="badge-filter">
            <option value="">All Badges</option>
            <option value="redDiamond">Red Diamond</option>
            <option value="blueDiamond">Blue Diamond</option>
            <option value="goldDiamond">Gold Diamond</option>
            <option value="verified">Verified</option>
          </select>
        </div>
        <div class="flex items-center gap-2 pb-2">
          <input type="checkbox" id="hire-me-filter" class="w-4 h-4">
          <label for="hire-me-filter" class="text-sm">Hire Me Only</label>
        </div>
        <button onclick="resetFilters()" style="background: var(--border);">Reset</button>
      </div>
    </div>

    <!-- Results Count -->
    <div class="flex justify-between items-center mb-4">
      <span class="text-sm opacity-60" id="results-count">Showing 0 talents</span>
    </div>

    <!-- Talent Grid -->
    <div id="talent-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <!-- Talent cards injected here -->
    </div>

    <!-- Pagination -->
    <div class="flex justify-center gap-2 mt-8 mb-8" id="pagination">
      <!-- Page buttons injected here -->
    </div>
  </main>

  <script>
    let allTalents = [];
    let filteredTalents = [];
    let currentPage = 1;
    const perPage = 50;
    let meta = {};

    const categoryColors = {
      'Video Editor': 'category-video',
      'Thumbnail Designer': 'category-thumb',
      'Creative Director': 'category-creative',
      'Channel Manager': 'category-channel',
      'Scriptwriter': 'category-script',
      'YouTube Producer': 'category-producer',
      'YouTube Strategist': 'category-strategist',
      'Voice Over': 'category-voice'
    };

    const badgeIcons = {
      'redDiamond': '💎',
      'blueDiamond': '💎',
      'goldDiamond': '💎',
      'verified': '✓'
    };

    const badgeClasses = {
      'redDiamond': 'badge-red',
      'blueDiamond': 'badge-blue',
      'goldDiamond': 'badge-gold'
    };

    async function loadData() {
      try {
        const res = await fetch('data/ytjobs.json?t=' + Date.now());
        const data = await res.json();
        allTalents = data.talents || [];
        meta = data.meta || {};
        filteredTalents = [...allTalents];
        
        document.getElementById('total-count').textContent = allTalents.length.toLocaleString();
        document.getElementById('last-updated').textContent = 'Last updated: ' + new Date(meta.updatedAt).toLocaleString();
        document.getElementById('progress-text').textContent = `${meta.pagesScraped} / ${meta.totalPages} pages (${meta.percentDone}%)`;
        document.getElementById('progress-bar').style.width = meta.percentDone + '%';
        
        populateCategoryFilter();
        renderCategoryStats();
        renderTalents();
      } catch (e) {
        console.error('Failed to load data:', e);
        document.getElementById('talent-grid').innerHTML = '<p class="text-center opacity-60 py-12">Failed to load talent data</p>';
      }
    }

    function populateCategoryFilter() {
      const categories = [...new Set(allTalents.map(t => t.category).filter(Boolean))].sort();
      const select = document.getElementById('category-filter');
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
    }

    function renderCategoryStats() {
      const counts = {};
      allTalents.forEach(t => {
        counts[t.category] = (counts[t.category] || 0) + 1;
      });
      
      const container = document.getElementById('category-stats');
      container.innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, count]) => {
          const colorClass = categoryColors[cat] || 'category-other';
          return `<span class="badge ${colorClass}">${cat}: ${count}</span>`;
        }).join('');
    }

    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const category = document.getElementById('category-filter').value;
      const badge = document.getElementById('badge-filter').value;
      const hireMeOnly = document.getElementById('hire-me-filter').checked;

      filteredTalents = allTalents.filter(t => {
        if (search && !t.name.toLowerCase().includes(search)) return false;
        if (category && t.category !== category) return false;
        if (badge === 'verified' && !t.isVerified) return false;
        if (badge && badge !== 'verified' && t.bestBadge !== badge) return false;
        if (hireMeOnly && !t.hasEnabledHireMe) return false;
        return true;
      });

      currentPage = 1;
      renderTalents();
    }

    function resetFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('category-filter').value = '';
      document.getElementById('badge-filter').value = '';
      document.getElementById('hire-me-filter').checked = false;
      filteredTalents = [...allTalents];
      currentPage = 1;
      renderTalents();
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function renderTalents() {
      const start = (currentPage - 1) * perPage;
      const pageTalents = filteredTalents.slice(start, start + perPage);
      
      document.getElementById('results-count').textContent = `Showing ${start + 1}-${Math.min(start + perPage, filteredTalents.length)} of ${filteredTalents.length.toLocaleString()} talents`;

      const grid = document.getElementById('talent-grid');
      if (pageTalents.length === 0) {
        grid.innerHTML = '<p class="text-center opacity-60 py-12 col-span-full">No talents match your filters</p>';
        renderPagination();
        return;
      }

      grid.innerHTML = pageTalents.map(t => {
        const catClass = categoryColors[t.category] || 'category-other';
        const badgeClass = badgeClasses[t.bestBadge] || '';
        const badgeIcon = badgeIcons[t.bestBadge] || '';
        const verified = t.isVerified ? '<span class="verified-icon" title="Verified">✓</span>' : '';
        const hireMe = t.hasEnabledHireMe ? '<span class="hire-me-badge">HIRE ME</span>' : '';
        
        return `
          <div class="card talent-card p-4 flex flex-col">
            <div class="flex items-start gap-3 mb-3">
              ${t.avatar ? 
                `<img src="${t.avatar}" class="w-12 h-12 rounded-full object-cover" alt="">` :
                `<div class="avatar-placeholder w-12 h-12 rounded-full text-lg">${getInitials(t.name)}</div>`
              }
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1">
                  <h3 class="font-semibold truncate">${t.name}</h3>
                  ${verified}
                </div>
                <span class="badge ${catClass}">${t.category || 'Other'}</span>
              </div>
            </div>
            <div class="flex items-center gap-2 mb-3">
              ${t.bestBadge ? `<span class="badge ${badgeClass}">${badgeIcon} ${t.bestBadge.replace('Diamond', '')}</span>` : ''}
              ${hireMe}
              ${t.hasVerifiedVideo ? '<span class="text-xs opacity-60">🎥 Video</span>' : ''}
            </div>
            <a href="${t.url}" target="_blank" class="mt-auto text-center py-2 rounded text-sm font-medium" style="background: var(--border); color: var(--accent-light);">
              View Profile →
            </a>
          </div>
        `;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredTalents.length / perPage);
      const container = document.getElementById('pagination');
      
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '';
      
      // Prev
      html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
      
      // Page numbers
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);
      
      if (startPage > 1) html += `<button disabled style="background: transparent;">...</button>`;
      
      for (let i = startPage; i <= endPage; i++) {
        const active = i === currentPage ? `style="background: var(--accent-light);"` : '';
        html += `<button onclick="goToPage(${i})" ${active}>${i}</button>`;
      }
      
      if (endPage < totalPages) html += `<button disabled style="background: transparent;">...</button>`;
      
      // Next
      html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
      
      container.innerHTML = html;
    }

    function goToPage(page) {
      const totalPages = Math.ceil(filteredTalents.length / perPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTalents();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Live filter listeners — auto-apply on any change
    document.getElementById('search-input').addEventListener('input', applyFilters);
    document.getElementById('category-filter').addEventListener('change', applyFilters);
    document.getElementById('badge-filter').addEventListener('change', applyFilters);
    document.getElementById('hire-me-filter').addEventListener('change', applyFilters);

    // Init
    loadData();
  </script>
</body>
</html>
