<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTJobs Talent DB - Nox Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f1a; }
    .card { background: #1a1a2e; border: 1px solid #252540; }
    .pill { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; }
    .badge-red { background: #ef4444; color: #fff; }
    .badge-blue { background: #3b82f6; color: #fff; }
    .badge-gold { background: #f59e0b; color: #fff; }
    .badge-gray { background: #6b7280; color: #fff; }
    .cat-video-editor { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .cat-thumbnail-designer { background: #ec489922; color: #f472b6; border: 1px solid #ec489944; }
    .cat-creative-director { background: #6366f122; color: #818cf8; border: 1px solid #6366f144; }
    .cat-channel-manager { background: #10b98122; color: #34d399; border: 1px solid #10b98144; }
    .cat-scriptwriter { background: #eab30822; color: #fbbf24; border: 1px solid #eab30844; }
    .cat-youtube-producer { background: #f9731622; color: #fb923c; border: 1px solid #f9731644; }
    .cat-youtube-strategist { background: #14b8a622; color: #2dd4bf; border: 1px solid #14b8a644; }
    .cat-voice-over { background: #06b6d422; color: #22d3ee; border: 1px solid #06b6d444; }
    .cat-other { background: #6b728022; color: #9ca3af; border: 1px solid #6b728044; }
    .avatar-fallback {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      background: #7c3aed33; color: #a78bfa; font-weight: 700; font-size: 1.1rem;
    }
  </style>
</head>
<body class="text-gray-200 min-h-screen">
  <!-- Header -->
  <header class="border-b border-[#252540] bg-[#1a1a2e]/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3">
          <a href="index.html" class="text-gray-400 hover:text-white text-sm">&larr; Dashboard</a>
          <span class="text-2xl">👥</span>
          <h1 class="text-xl font-bold text-white">YTJobs Talent DB</h1>
        </div>
        <div class="flex items-center gap-4 text-sm">
          <span id="total-count" class="text-gray-400"></span>
          <span id="last-updated" class="text-gray-400"></span>
        </div>
      </div>
      <!-- Progress bar -->
      <div class="mt-3">
        <div class="flex items-center justify-between text-xs text-gray-400 mb-1">
          <span id="progress-label">Scraping progress</span>
          <span id="progress-pct"></span>
        </div>
        <div class="w-full bg-[#252540] rounded-full h-2">
          <div id="progress-bar" class="bg-[#7c3aed] h-2 rounded-full transition-all" style="width:0%"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- Category stats -->
    <div id="cat-stats" class="flex flex-wrap gap-2 mb-6"></div>

    <!-- Filter bar -->
    <div class="card rounded-lg p-4 mb-6 flex flex-wrap items-center gap-3">
      <select id="filter-category" class="bg-[#0f0f1a] border border-[#252540] text-gray-300 text-sm rounded px-3 py-2 focus:outline-none focus:border-[#7c3aed]">
        <option value="all">All Categories</option>
      </select>
      <select id="filter-badge" class="bg-[#0f0f1a] border border-[#252540] text-gray-300 text-sm rounded px-3 py-2 focus:outline-none focus:border-[#7c3aed]">
        <option value="all">All Badges</option>
        <option value="redDiamond">Red Diamond</option>
        <option value="blueDiamond">Blue Diamond</option>
        <option value="goldDiamond">Gold Diamond</option>
      </select>
      <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
        <input type="checkbox" id="filter-hire" class="accent-[#7c3aed]">
        Hire Me Only
      </label>
      <input type="text" id="filter-search" placeholder="Search name..." class="bg-[#0f0f1a] border border-[#252540] text-gray-300 text-sm rounded px-3 py-2 focus:outline-none focus:border-[#7c3aed] flex-1 min-w-[180px]">
      <span id="filtered-count" class="text-xs text-gray-500 ml-auto"></span>
    </div>

    <!-- Grid -->
    <div id="talent-grid" class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-4 mt-8">
      <button id="prev-page" class="px-4 py-2 bg-[#252540] hover:bg-[#353560] text-gray-300 rounded text-sm transition-colors disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
      <span id="page-info" class="text-sm text-gray-400"></span>
      <button id="next-page" class="px-4 py-2 bg-[#252540] hover:bg-[#353560] text-gray-300 rounded text-sm transition-colors disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
    </div>
  </main>

  <script>
  (function() {
    const PER_PAGE = 50;
    let allTalents = [];
    let filtered = [];
    let currentPage = 1;

    const BADGE_EMOJI = {
      redDiamond: '\u{1F534}',
      blueDiamond: '\u{1F535}',
      goldDiamond: '\u{1F7E1}',
    };

    const CAT_CLASS = {
      'Video Editor': 'cat-video-editor',
      'Thumbnail Designer': 'cat-thumbnail-designer',
      'Creative Director': 'cat-creative-director',
      'Channel Manager': 'cat-channel-manager',
      'Scriptwriter': 'cat-scriptwriter',
      'YouTube Producer': 'cat-youtube-producer',
      'YouTube Strategist': 'cat-youtube-strategist',
      'Voice Over': 'cat-voice-over',
    };

    function catClass(cat) { return CAT_CLASS[cat] || 'cat-other'; }

    function badgeClass(b) {
      if (b === 'redDiamond') return 'badge-red';
      if (b === 'blueDiamond') return 'badge-blue';
      if (b === 'goldDiamond') return 'badge-gold';
      return 'badge-gray';
    }

    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    }

    function renderCard(t) {
      const avatarHtml = t.avatar
        ? `<img src="${t.avatar}" alt="" class="w-12 h-12 rounded-full object-cover" onerror="this.outerHTML='<div class=\\'avatar-fallback\\'>${initials(t.name)}</div>'">`
        : `<div class="avatar-fallback">${initials(t.name)}</div>`;

      const verifiedHtml = t.isVerified ? '<span title="Verified">&#x2705;</span>' : '';
      const badgeHtml = t.bestBadge ? `<span class="pill ${badgeClass(t.bestBadge)}" title="${t.bestBadge}">${BADGE_EMOJI[t.bestBadge] || '\u{25C6}'} ${t.bestBadge}</span>` : '';
      const catHtml = `<span class="pill ${catClass(t.category)}">${t.category}</span>`;

      return `<div class="card rounded-lg p-4 flex flex-col gap-3 hover:border-[#7c3aed55] transition-colors">
        <div class="flex items-center gap-3">
          ${avatarHtml}
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <span class="font-semibold text-white truncate">${t.name}</span>
              ${verifiedHtml}
            </div>
            <div class="flex flex-wrap gap-1.5 mt-1">${catHtml}${badgeHtml}</div>
          </div>
        </div>
        <div class="flex items-center justify-between mt-auto">
          ${t.hasEnabledHireMe ? '<span class="text-xs text-green-400">Open to hire</span>' : '<span class="text-xs text-gray-600">-</span>'}
          <a href="${t.url}" target="_blank" rel="noopener" class="text-xs text-[#7c3aed] hover:text-[#a78bfa] transition-colors">View Profile &rarr;</a>
        </div>
      </div>`;
    }

    function applyFilters() {
      const cat = document.getElementById('filter-category').value;
      const badge = document.getElementById('filter-badge').value;
      const hire = document.getElementById('filter-hire').checked;
      const search = document.getElementById('filter-search').value.toLowerCase().trim();

      filtered = allTalents.filter(t => {
        if (cat !== 'all' && t.category !== cat) return false;
        if (badge !== 'all' && t.bestBadge !== badge) return false;
        if (hire && !t.hasEnabledHireMe) return false;
        if (search && !t.name.toLowerCase().includes(search)) return false;
        return true;
      });

      currentPage = 1;
      render();
    }

    function render() {
      const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PER_PAGE;
      const page = filtered.slice(start, start + PER_PAGE);

      document.getElementById('talent-grid').innerHTML = page.length
        ? page.map(renderCard).join('')
        : '<div class="col-span-full text-center text-gray-500 py-12">No talents match your filters</div>';

      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prev-page').disabled = currentPage <= 1;
      document.getElementById('next-page').disabled = currentPage >= totalPages;
      document.getElementById('filtered-count').textContent = `${filtered.length} results`;
    }

    function renderCatStats(talents) {
      const counts = {};
      talents.forEach(t => { counts[t.category] = (counts[t.category] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      document.getElementById('cat-stats').innerHTML = sorted.map(([cat, n]) =>
        `<span class="pill ${catClass(cat)}">${cat}: ${n.toLocaleString()}</span>`
      ).join('');
    }

    function populateCategoryDropdown(talents) {
      const cats = [...new Set(talents.map(t => t.category))].sort();
      const sel = document.getElementById('filter-category');
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    async function init() {
      try {
        const resp = await fetch('data/ytjobs.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        const meta = data.meta || {};
        allTalents = data.talents || [];

        // Header info
        document.getElementById('total-count').textContent = `${meta.totalTalents?.toLocaleString() || allTalents.length} talents`;
        document.getElementById('last-updated').textContent = meta.updatedAt ? `Updated: ${new Date(meta.updatedAt).toLocaleString()}` : '';
        document.getElementById('progress-label').textContent = `${meta.pagesScraped || 0} / ${meta.totalPages || 7668} pages scraped`;
        const pct = meta.percentDone || 0;
        document.getElementById('progress-pct').textContent = `${pct}%`;
        document.getElementById('progress-bar').style.width = `${pct}%`;

        renderCatStats(allTalents);
        populateCategoryDropdown(allTalents);

        filtered = [...allTalents];
        render();
      } catch (e) {
        document.getElementById('talent-grid').innerHTML = `<div class="col-span-full text-center text-red-400 py-12">Failed to load data: ${e.message}</div>`;
      }
    }

    // Event listeners
    document.getElementById('filter-category').addEventListener('change', applyFilters);
    document.getElementById('filter-badge').addEventListener('change', applyFilters);
    document.getElementById('filter-hire').addEventListener('change', applyFilters);
    document.getElementById('filter-search').addEventListener('input', applyFilters);
    document.getElementById('prev-page').addEventListener('click', () => { currentPage--; render(); window.scrollTo(0,0); });
    document.getElementById('next-page').addEventListener('click', () => { currentPage++; render(); window.scrollTo(0,0); });

    init();
  })();
  </script>
</body>
</html>
