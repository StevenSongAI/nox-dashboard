<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Inspiration Board — Nox Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card { background: #1a1a2e; border: 1px solid #252540; border-radius: 12px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: #7c3aed88; transform: translateY(-2px); }
  .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #252540; }
  .technique-chip { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #7c3aed18; color: #a78bfa; border: 1px solid #7c3aed30; margin: 2px; white-space: nowrap; }
  .badge-stills { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: #10b98120; color: #34d399; }
  .badge-faceless { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: #3b82f620; color: #60a5fa; }
  .channel-pill { font-size: 12px; color: #94a3b8; }
  .empty-state { text-align: center; padding: 80px 20px; color: #6b7280; }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="flex items-start justify-between mb-8">
    <div>
      <a href="index.html" class="text-sm text-purple-400 hover:text-purple-300">← Back to Dashboard</a>
      <h1 class="text-2xl font-bold mt-2">🎨 Inspiration Board</h1>
      <p class="text-gray-500 text-sm mt-1">Video style references — send a YouTube link via Telegram and it gets added automatically</p>
    </div>
    <div id="count-badge" class="text-sm text-gray-500 mt-6"></div>
  </div>

  <!-- Grid -->
  <div id="board-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="card col-span-3 text-center text-gray-500 py-12">Loading…</div>
  </div>

</div>

<script>
const BACKEND_URL = 'https://nox-dashboard-api-production.up.railway.app';
const API_KEY = '8863da180beec2f364bea071833afd8f';

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function init() {
  try {
    const resp = await fetch(BACKEND_URL + '/api/entries?category=inspiration&limit=500', {
      headers: { 'Authorization': 'Bearer ' + API_KEY }
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const json = await resp.json();
    const entries = (json.entries || []).sort((a, b) =>
      new Date(b.created_at) - new Date(a.created_at)
    );
    render(entries);
  } catch (err) {
    document.getElementById('board-grid').innerHTML =
      `<div class="card col-span-3 text-center text-red-400 py-12">Failed to load: ${esc(err.message)}</div>`;
  }
}

function render(entries) {
  const grid = document.getElementById('board-grid');
  const countBadge = document.getElementById('count-badge');

  if (!entries.length) {
    grid.innerHTML = `<div class="card col-span-3 empty-state">
      <div class="text-4xl mb-3">🎬</div>
      <div class="text-lg font-medium text-gray-400 mb-2">No entries yet</div>
      <div class="text-sm">Send a YouTube link via Telegram to add the first one</div>
    </div>`;
    return;
  }

  countBadge.textContent = entries.length + ' video' + (entries.length !== 1 ? 's' : '') + ' analyzed';

  grid.innerHTML = entries.map(e => {
    const d = e.data || {};
    const videoId = d.video_id || '';
    const thumb = d.thumbnail_url || (videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : '');
    const videoUrl = d.video_url || (videoId ? `https://youtu.be/${videoId}` : '#');
    const techniques = d.key_techniques || [];
    const stills = d.stills_count || 0;
    const faceless = d.faceless_compatible;
    const dateAdded = formatDate(d.date_added || e.created_at);
    const uploadDate = d.upload_date ? formatDate(d.upload_date) : '';
    const subs = d.subs ? (d.subs >= 1000000 ? (d.subs/1000000).toFixed(1)+'M' : Math.round(d.subs/1000)+'K') : '';
    const views = d.video_views ? (d.video_views >= 1000000 ? (d.video_views/1000000).toFixed(1)+'M' : Math.round(d.video_views/1000)+'K') + ' views' : '';

    return `
      <a href="${esc(videoUrl)}" target="_blank" rel="noopener" class="card block no-underline">
        ${thumb ? `<img class="thumb" src="${esc(thumb)}" alt="${esc(e.title)}" loading="lazy" onerror="this.style.display='none'">` : '<div class="thumb bg-[#252540]"></div>'}
        <div class="p-4">
          <h3 class="font-semibold text-white text-sm leading-snug mb-1 line-clamp-2">${esc(e.title)}</h3>
          <div class="flex items-center gap-2 mb-3">
            <span class="channel-pill">${esc(d.channel_handle || d.channel_name || '')}</span>
            ${subs ? `<span class="text-xs text-gray-600">·</span><span class="text-xs text-gray-500">${esc(subs)} subs</span>` : ''}
            ${views ? `<span class="text-xs text-gray-600">·</span><span class="text-xs text-gray-500">${esc(views)}</span>` : ''}
          </div>
          <p class="text-xs text-gray-400 mb-3 leading-relaxed line-clamp-2">${esc(e.description || '')}</p>
          <div class="mb-3 flex flex-wrap">
            ${techniques.slice(0, 4).map(t => `<span class="technique-chip">${esc(t.split('—')[0].trim())}</span>`).join('')}
            ${techniques.length > 4 ? `<span class="technique-chip">+${techniques.length - 4} more</span>` : ''}
          </div>
          <div class="flex items-center gap-2 pt-3 border-t border-[#252540]">
            ${stills ? `<span class="badge-stills">📸 ${stills} stills saved</span>` : ''}
            ${faceless ? `<span class="badge-faceless">✓ Faceless-ready</span>` : ''}
            <span class="text-xs text-gray-600 ml-auto">${esc(dateAdded)}</span>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
