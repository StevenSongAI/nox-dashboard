<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects in Development — Nox Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card { background: #1a1a2e; border: 1px solid #252540; border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
  .card:hover { border-color: #7c3aed55; }
  .progress-bar { height: 6px; background: #252540; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #8b5cf6); border-radius: 3px; transition: width 0.4s; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
  .status-in_production { background: #10b98120; color: #34d399; }
  .status-scripted { background: #8b5cf620; color: #a78bfa; }
  .status-concept { background: #6b728020; color: #9ca3af; }
  .status-paused { background: #f5930820; color: #fb923c; }
  .channel-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #252540; color: #94a3b8; }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8">

  <div class="flex items-center justify-between mb-8">
    <div>
      <a href="index.html" class="text-sm text-purple-400 hover:text-purple-300">← Back to Dashboard</a>
      <h1 class="text-2xl font-bold mt-2">🚧 Projects in Development</h1>
      <p class="text-gray-500 text-sm mt-1">Active builds, scripts, and production projects</p>
    </div>
    <div id="filter-bar" class="flex gap-2 flex-wrap justify-end"></div>
  </div>

  <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="card col-span-2 text-center text-gray-500 py-8">Loading…</div>
  </div>

</div>

<script>
const STATUS_LABELS = {
  in_production: 'In Production',
  scripted: 'Scripted',
  concept: 'Concept',
  paused: 'Paused',
  active: 'Active'
};

const BACKEND_URL = 'https://nox-dashboard-api-production.up.railway.app';
const API_KEY = '8863da180beec2f364bea071833afd8f';

async function init() {
  try {
    // Try backend API first
    const resp = await fetch(BACKEND_URL + '/api/entries?category=dev_project&limit=200', {
      headers: { 'Authorization': 'Bearer ' + API_KEY }
    });
    if (!resp.ok) throw new Error('API HTTP ' + resp.status);
    const json = await resp.json();
    const projects = (json.entries || []).map(e => ({
      id: e.source_id || e.id,
      title: e.title,
      description: e.description,
      status: e.status,
      channel: e.channel,
      progress: e.progress || 0,
      nextAction: e.data?.nextAction || '',
      versions: e.data?.versions || [],
      tags: e.data?.tags || []
    }));
    render(projects);
  } catch (apiErr) {
    console.warn('API failed, falling back to static JSON:', apiErr);
    try {
      const resp = await fetch('data/dev-projects.json?v=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      render(data.projects || []);
    } catch (e) {
      document.getElementById('project-grid').innerHTML =
        '<div class="card col-span-2 text-center text-red-400 py-8">Failed to load projects: ' + e.message + '</div>';
    }
  }
}

function render(projects) {
  const grid = document.getElementById('project-grid');
  if (!projects.length) {
    grid.innerHTML = '<div class="card col-span-2 text-center text-gray-500 py-8">No projects found.</div>';
    return;
  }

  grid.innerHTML = projects.map(p => {
    const statusClass = 'status-' + (p.status || 'concept');
    const statusLabel = STATUS_LABELS[p.status] || p.status || 'Unknown';
    const progress = p.progress || 0;

    return `
      <div class="card">
        <div class="flex items-start justify-between gap-3 mb-3">
          <h3 class="font-semibold text-white text-base leading-snug">${esc(p.title || p.name || p.id)}</h3>
          <div class="flex items-center gap-2 shrink-0">
            ${p.channel ? `<span class="channel-badge">${esc(p.channel)}</span>` : ''}
            <span class="status-badge ${statusClass}">${esc(statusLabel)}</span>
          </div>
        </div>

        <p class="text-sm text-gray-400 mb-4 leading-relaxed">${esc(p.description || '')}</p>

        ${progress > 0 ? `
        <div class="mb-4">
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span>Progress</span>
            <span>${progress}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        </div>` : ''}

        ${p.nextAction ? `
        <div class="flex items-start gap-2 mt-3 pt-3 border-t border-[#252540]">
          <span class="text-xs text-purple-400 font-medium shrink-0 mt-0.5">Next →</span>
          <span class="text-xs text-gray-400">${esc(p.nextAction)}</span>
        </div>` : ''}

        ${p.versions && p.versions.length ? `
        <div class="mt-3 pt-3 border-t border-[#252540]">
          <p class="text-xs text-gray-500 mb-1">Latest: <span class="text-purple-400">v${esc(p.versions[0].version)}</span> — ${esc(p.versions[0].changes)}</p>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
