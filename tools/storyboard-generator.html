<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyboard Generator | Nox Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }
        .header h1 {
            color: #00d4ff;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .header p {
            color: #888;
            font-size: 0.95rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        .panel {
            background: #12121a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a3a;
        }
        .panel h2 {
            color: #00d4ff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #1a1a2a;
            border: 1px solid #3a3a4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 6px;
            color: #0a0a0f;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .btn-secondary {
            background: #2a2a3a;
            color: #e0e0e0;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #3a3a4a;
            box-shadow: none;
        }
        .storyboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .scene-card {
            background: #1a1a2a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
            transition: transform 0.2s, border-color 0.2s;
        }
        .scene-card:hover {
            transform: translateY(-3px);
            border-color: #00d4ff;
        }
        .scene-header {
            background: #252538;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .scene-number {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .scene-type {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .scene-type.intro { background: #2d5a3d; color: #7dd87d; }
        .scene-type.action { background: #5a3d2d; color: #ffb347; }
        .scene-type.climax { background: #5a2d2d; color: #ff6b6b; }
        .scene-type.outro { background: #3d2d5a; color: #b8a0ff; }
        .scene-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1a1a2a 0%, #2a2a3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.85rem;
            border-bottom: 1px solid #2a2a3a;
        }
        .scene-content {
            padding: 15px;
        }
        .scene-content h4 {
            color: #e0e0e0;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        .scene-content p {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .scene-meta {
            padding: 10px 15px;
            background: #12121a;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
        }
        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a3a;
        }
        .export-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .template-presets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .preset-btn {
            padding: 8px;
            background: #1a1a2a;
            border: 1px solid #3a3a4a;
            border-radius: 6px;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Storyboard Generator</h1>
        <p>Generate structured video storyboards with scene breakdowns, timing, and visual direction</p>
    </div>

    <div class="container">
        <div class="panel">
            <h2>⚙️ Configuration</h2>
            
            <div class="form-group">
                <label>Video Title</label>
                <input type="text" id="videoTitle" placeholder="e.g., I Got a Pet T-Rex">
            </div>

            <div class="form-group">
                <label>Video Type</label>
                <select id="videoType">
                    <option value="gaming">Gaming/Minecraft</option>
                    <option value="creature">AI Creature/Pet</option>
                    <option value="comparison">Tool Comparison</option>
                    <option value="reaction">Reaction/Analysis</option>
                    <option value="tutorial">Tutorial/How-to</option>
                </select>
            </div>

            <div class="form-group">
                <label>Target Duration</label>
                <select id="duration">
                    <option value="short">Short (2-5 min)</option>
                    <option value="medium" selected>Medium (8-12 min)</option>
                    <option value="long">Long (15-20 min)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Key Concept</label>
                <textarea id="concept" placeholder="Describe the main idea, creature, or topic..."></textarea>
            </div>

            <div class="form-group">
                <label>Hook/Opening</label>
                <input type="text" id="hook" placeholder="First 5 seconds hook...">
            </div>

            <div class="template-presets">
                <button class="preset-btn" onclick="loadPreset('creature')">🦖 Creature Pet</button>
                <button class="preset-btn" onclick="loadPreset('comparison')">⚖️ Comparison</button>
                <button class="preset-btn" onclick="loadPreset('tutorial')">📚 Tutorial</button>
                <button class="preset-btn" onclick="loadPreset('reaction')">🎭 Reaction</button>
            </div>

            <button class="btn" onclick="generateStoryboard()">Generate Storyboard</button>
            <button class="btn btn-secondary" onclick="clearStoryboard()">Clear</button>

            <div class="export-section">
                <h2>💾 Export</h2>
                <div class="export-options">
                    <button class="btn btn-secondary" onclick="exportJSON()">Export JSON</button>
                    <button class="btn btn-secondary" onclick="exportMarkdown()">Export MD</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>🎞️ Storyboard Preview</h2>
            <div id="storyboard" class="storyboard">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </svg>
                    <p>Configure your video settings and click Generate to create a storyboard</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const presets = {
            creature: {
                title: "I Got a Pet [Creature]",
                type: "creature",
                duration: "medium",
                concept: "Player discovers and raises an AI-generated creature from egg to adult. Shows feeding, training, and bonding moments.",
                hook: "I found something impossible in Minecraft today..."
            },
            comparison: {
                title: "[Tool A] vs [Tool B] - 30 Day Test",
                type: "comparison",
                duration: "long",
                concept: "Side-by-side comparison of two tools over 30 days. Daily progress tracking and final verdict.",
                hook: "I used both tools for 30 days. The results shocked me."
            },
            tutorial: {
                title: "How to [Achieve Result] in [Timeframe]",
                type: "tutorial",
                duration: "medium",
                concept: "Step-by-step guide teaching viewers a specific skill or technique with clear examples.",
                hook: "Stop doing this wrong. Here's the right way."
            },
            reaction: {
                title: "Reacting to [Viral Thing]",
                type: "reaction",
                duration: "short",
                concept: "Genuine reaction to trending content with analysis and commentary.",
                hook: "This is breaking the internet right now..."
            }
        };

        function loadPreset(type) {
            const preset = presets[type];
            document.getElementById('videoTitle').value = preset.title;
            document.getElementById('videoType').value = preset.type;
            document.getElementById('duration').value = preset.duration;
            document.getElementById('concept').value = preset.concept;
            document.getElementById('hook').value = preset.hook;
        }

        function generateStoryboard() {
            const title = document.getElementById('videoTitle').value || 'Untitled Video';
            const type = document.getElementById('videoType').value;
            const duration = document.getElementById('duration').value;
            const concept = document.getElementById('concept').value;
            const hook = document.getElementById('hook').value;

            const sceneCounts = { short: 4, medium: 6, long: 8 };
            const sceneCount = sceneCounts[duration];

            const scenes = generateScenes(type, sceneCount, title, concept, hook);
            renderStoryboard(scenes);
        }

        function generateScenes(type, count, title, concept, hook) {
            const sceneTypes = ['intro', 'action', 'action', 'climax', 'action', 'outro'];
            const scenes = [];

            // Scene 1: Hook/Intro
            scenes.push({
                number: 1,
                type: 'intro',
                title: 'Hook',
                description: hook || 'Attention-grabbing opening that sets up the video premise.',
                duration: '0:00-0:15',
                visual: 'Dynamic opening shot with text overlay'
            });

            // Scene 2: Setup
            scenes.push({
                number: 2,
                type: 'action',
                title: 'Setup/Context',
                description: `Introduce the concept: ${concept?.substring(0, 60) || 'Main topic'}...`,
                duration: '0:15-1:00',
                visual: 'Wide establishing shot, intro graphics'
            });

            // Middle scenes
            for (let i = 3; i < count; i++) {
                const isClimax = i === Math.floor(count / 2) + 1;
                scenes.push({
                    number: i,
                    type: isClimax ? 'climax' : 'action',
                    title: isClimax ? 'Climax/Main Event' : `Development ${i-2}`,
                    description: isClimax 
                        ? 'Peak moment of the video - the main reveal, challenge, or turning point.'
                        : `Build tension and develop the narrative. Show progression and key moments.`,
                    duration: getDuration(i, count),
                    visual: isClimax ? 'Dramatic lighting, close-ups' : 'Gameplay footage, B-roll'
                });
            }

            // Final scene: Outro
            scenes.push({
                number: count,
                type: 'outro',
                title: 'Outro/CTA',
                description: 'Wrap up the video with key takeaways, subscribe call-to-action, and tease next video.',
                duration: `-${0:30}`,
                visual: 'End screen with subscribe button, related videos'
            });

            return scenes;
        }

        function getDuration(sceneNum, total) {
            const timestamps = {
                3: '1:00-3:00',
                4: '3:00-5:00',
                5: '5:00-7:00',
                6: '7:00-9:00',
                7: '9:00-11:00'
            };
            return timestamps[sceneNum] || `${sceneNum}:00-${sceneNum+2}:00`;
        }

        function renderStoryboard(scenes) {
            const container = document.getElementById('storyboard');
            container.innerHTML = scenes.map(scene => `
                <div class="scene-card">
                    <div class="scene-header">
                        <span class="scene-number">Scene ${scene.number}</span>
                        <span class="scene-type ${scene.type}">${scene.type}</span>
                    </div>
                    <div class="scene-image">
                        <span>🎬 ${scene.visual}</span>
                    </div>
                    <div class="scene-content">
                        <h4>${scene.title}</h4>
                        <p>${scene.description}</p>
                    </div>
                    <div class="scene-meta">
                        <span>⏱️ ${scene.duration}</span>
                        <span>📝 Add note</span>
                    </div>
                </div>
            `).join('');
        }

        function clearStoryboard() {
            document.getElementById('storyboard').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18M9 21V9"/>
                    </svg>
                    <p>Configure your video settings and click Generate to create a storyboard</p>
                </div>
            `;
        }

        function exportJSON() {
            const cards = document.querySelectorAll('.scene-card');
            if (cards.length === 0) {
                alert('Generate a storyboard first!');
                return;
            }
            
            const scenes = Array.from(cards).map(card => ({
                number: card.querySelector('.scene-number').textContent,
                type: card.querySelector('.scene-type').textContent,
                title: card.querySelector('h4').textContent,
                description: card.querySelector('p').textContent,
                duration: card.querySelector('.scene-meta span').textContent.replace('⏱️ ', '')
            }));

            const data = {
                title: document.getElementById('videoTitle').value,
                created: new Date().toISOString(),
                scenes: scenes
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `storyboard-${data.title.replace(/\s+/g, '-').toLowerCase()}.json`;
            a.click();
        }

        function exportMarkdown() {
            const cards = document.querySelectorAll('.scene-card');
            if (cards.length === 0) {
                alert('Generate a storyboard first!');
                return;
            }

            const title = document.getElementById('videoTitle').value || 'Untitled';
            let md = `# ${title} - Storyboard\n\n`;
            md += `Generated: ${new Date().toLocaleString()}\n\n`;
            md += `## Scenes\n\n`;

            Array.from(cards).forEach(card => {
                const num = card.querySelector('.scene-number').textContent;
                const type = card.querySelector('.scene-type').textContent;
                const sceneTitle = card.querySelector('h4').textContent;
                const desc = card.querySelector('p').textContent;
                const duration = card.querySelector('.scene-meta span').textContent.replace('⏱️ ', '');

                md += `### ${num}: ${sceneTitle}\n`;
                md += `- **Type:** ${type}\n`;
                md += `- **Duration:** ${duration}\n`;
                md += `- **Description:** ${desc}\n\n`;
            });

            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `storyboard-${title.replace(/\s+/g, '-').toLowerCase()}.md`;
            a.click();
        }
    </script>
</body>
</html>
